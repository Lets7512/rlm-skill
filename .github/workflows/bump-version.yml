name: Bump Version on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping to version: $VERSION"

      - name: Update all version files
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

          # plugin.json
          python3 -c "
          import json
          with open('.claude-plugin/plugin.json') as f:
              data = json.load(f)
          data['version'] = '$VERSION'
          with open('.claude-plugin/plugin.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

          # marketplace.json (plugin version inside plugins array)
          python3 -c "
          import json
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          for plugin in data.get('plugins', []):
              plugin['version'] = '$VERSION'
          with open('.claude-plugin/marketplace.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Verify versions match
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Checking all files have version $VERSION..."

          grep -q "version = \"$VERSION\"" pyproject.toml || { echo "FAIL: pyproject.toml"; exit 1; }
          grep -q "\"version\": \"$VERSION\"" .claude-plugin/plugin.json || { echo "FAIL: plugin.json"; exit 1; }
          grep -q "\"version\": \"$VERSION\"" .claude-plugin/marketplace.json || { echo "FAIL: marketplace.json"; exit 1; }

          echo "All versions match $VERSION"

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes needed" && exit 0
          git commit -m "chore: bump version to $VERSION"
          git push origin master
